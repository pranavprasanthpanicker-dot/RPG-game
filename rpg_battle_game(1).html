<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Battle RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8cc80;
  --gold-dark: #8a6f2e;
  --blood: #8b1a1a;
  --blood-light: #c0392b;
  --deep: #0a0a0f;
  --panel: #12121a;
  --panel2: #1a1a26;
  --border: rgba(201,168,76,0.25);
  --text: #d4c5a0;
  --muted: #7a6e5a;
  --warrior: #e07b39;
  --knight: #5b9bd5;
  --sorcerer: #9b6dd6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative; z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

/* Header */
.site-header {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadeDown 0.6s ease both;
}
.site-header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-shadow: 0 0 40px rgba(201,168,76,0.3);
}
.site-header .subtitle {
  font-size: 0.95rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-top: 4px;
  text-transform: uppercase;
  font-weight: 300;
}
.divider {
  display: flex; align-items: center; gap: 1rem;
  margin: 1rem auto 0;
  max-width: 300px;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}
.divider-icon { color: var(--gold); font-size: 14px; opacity: 0.7; }

/* Screens */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.4s ease both; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-12px); }
  to   { opacity:1; transform: translateY(0); }
}

/* Panels */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  position: relative;
}
.panel::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 4px;
  background: linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

/* Input */
input[type=text] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 1.1rem;
  padding: 0.6rem 0.9rem;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.25rem;
}
input[type=text]:focus { border-color: var(--gold); }
input[type=text]::placeholder { color: var(--muted); }

/* Class cards */
.class-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1.25rem;
}
.class-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.1rem 0.75rem;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.class-card:hover { background: rgba(255,255,255,0.06); }
.class-card.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.07);
}
.class-card.selected::after {
  content: '✦';
  position: absolute; top: 6px; right: 8px;
  font-size: 9px; color: var(--gold); opacity: 0.8;
}
.class-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.class-name {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--gold-light);
  margin-bottom: 4px;
}
.class-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }

/* Stats row */
.stats-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.stat-pill {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 4px 10px;
  font-size: 0.8rem;
  color: var(--muted);
}
.stat-pill strong { color: var(--text); font-weight: 500; }

/* Button */
.btn {
  width: 100%;
  padding: 0.75rem 1rem;
  background: transparent;
  border: 1px solid var(--gold);
  border-radius: 3px;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.btn:hover:not(:disabled) { background: rgba(201,168,76,0.12); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.danger {
  border-color: var(--blood-light);
  color: var(--blood-light);
}
.btn.danger:hover:not(:disabled) { background: rgba(192,57,43,0.12); }

/* Battle screen */
.fighters {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0.75rem;
  align-items: center;
  margin-bottom: 1.25rem;
}
.vs {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--gold);
  opacity: 0.5;
  text-align: center;
}
.fighter-panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
}
.fighter-panel.player-side { border-color: rgba(91,155,213,0.3); }
.fighter-panel.bot-side { border-color: rgba(139,26,26,0.4); }
.fighter-name {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--gold-light);
  margin-bottom: 2px;
}
.fighter-class { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; }

/* Bar */
.bar-wrap { margin-bottom: 6px; }
.bar-label {
  display: flex; justify-content: space-between;
  font-size: 0.72rem; color: var(--muted);
  margin-bottom: 3px;
}
.bar-track {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}
.bar-fill.hp { background: var(--knight); }
.bar-fill.hp-enemy { background: var(--blood-light); }
.bar-fill.mp { background: var(--sorcerer); }

/* Move grid */
.move-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.25rem;
}
.move-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.9rem;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, border-color 0.15s;
  color: var(--text);
}
.move-btn:hover:not(:disabled) { background: rgba(201,168,76,0.07); border-color: rgba(201,168,76,0.4); }
.move-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.move-title {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--gold-light);
  margin-bottom: 4px;
}
.move-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.3; }

/* Log */
.log-title {
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.log-box {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 3px;
  padding: 0.75rem;
  max-height: 150px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.log-line {
  font-size: 0.88rem;
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  line-height: 1.4;
}
.log-line:last-child { border-bottom: none; }
.log-line.player { color: #7aaddb; }
.log-line.bot { color: #d97b7b; }
.log-line.heal { color: #7dbf7a; }
.log-line.system { color: var(--gold); font-style: italic; }

/* Result */
.result-screen {
  text-align: center;
  padding: 2.5rem 1rem;
}
.result-rune { font-size: 4rem; margin-bottom: 1rem; display: block; animation: pulse 1s ease infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
.result-heading {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}
.result-heading.win { color: var(--gold); text-shadow: 0 0 30px rgba(201,168,76,0.4); }
.result-heading.lose { color: var(--blood-light); text-shadow: 0 0 30px rgba(192,57,43,0.4); }
.result-desc { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }
</style>
</head>
<body>
<div id="app">
  <div class="site-header">
    <h1>ARENA</h1>
    <p class="subtitle">Battle of Champions</p>
    <div class="divider"><span class="divider-icon">⚔</span></div>
  </div>

  <!-- CREATE -->
  <div id="screen-create" class="screen active">
    <div class="panel">
      <div class="panel-title">Create your champion</div>
      <input type="text" id="char-name" placeholder="Enter your name..." maxlength="16">
      <div class="class-grid">
        <div class="class-card selected" onclick="selectClass(0)" id="cls-0">
          <span class="class-icon">⚔️</span>
          <div class="class-name">Warrior</div>
          <div class="class-desc">Brute force &amp; attack boost</div>
        </div>
        <div class="class-card" onclick="selectClass(1)" id="cls-1">
          <span class="class-icon">🛡️</span>
          <div class="class-name">Knight</div>
          <div class="class-desc">Iron defense &amp; endurance</div>
        </div>
        <div class="class-card" onclick="selectClass(2)" id="cls-2">
          <span class="class-icon">🔮</span>
          <div class="class-name">Sorcerer</div>
          <div class="class-desc">Arcane power &amp; healing</div>
        </div>
      </div>
      <div class="stats-row" id="stat-preview"></div>
      <button class="btn" onclick="startGame()">Enter the Arena →</button>
    </div>
  </div>

  <!-- BATTLE -->
  <div id="screen-battle" class="screen">
    <div class="panel">
      <div class="fighters">
        <div class="fighter-panel player-side">
          <div class="fighter-name" id="p-name">—</div>
          <div class="fighter-class" id="p-class">—</div>
          <div class="bar-wrap">
            <div class="bar-label"><span>HP</span><span id="p-hp-val">—</span></div>
            <div class="bar-track"><div class="bar-fill hp" id="p-hp-bar" style="width:100%"></div></div>
          </div>
          <div class="bar-wrap">
            <div class="bar-label"><span>MP</span><span id="p-mp-val">—</span></div>
            <div class="bar-track"><div class="bar-fill mp" id="p-mp-bar" style="width:100%"></div></div>
          </div>
        </div>
        <div class="vs">VS</div>
        <div class="fighter-panel bot-side">
          <div class="fighter-name" id="b-name">—</div>
          <div class="fighter-class" id="b-class">—</div>
          <div class="bar-wrap">
            <div class="bar-label"><span>HP</span><span id="b-hp-val">—</span></div>
            <div class="bar-track"><div class="bar-fill hp-enemy" id="b-hp-bar" style="width:100%"></div></div>
          </div>
        </div>
      </div>
      <div class="move-grid">
        <button class="move-btn" onclick="doMove('attack')" id="btn-attack">
          <div class="move-title">⚔ Normal Attack</div>
          <div class="move-desc">Strike the enemy with your weapon</div>
        </button>
        <button class="move-btn" onclick="doMove('special')" id="btn-special">
          <div class="move-title" id="special-title">✦ Special</div>
          <div class="move-desc" id="special-desc">—</div>
        </button>
      </div>
      <div class="log-title">Battle Chronicle</div>
      <div class="log-box" id="battle-log"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="panel">
      <div class="result-screen">
        <span class="result-rune" id="result-icon">🏆</span>
        <div class="result-heading" id="result-title">Victory</div>
        <p class="result-desc" id="result-desc"></p>
        <button class="btn" onclick="showCreate()">Fight Again →</button>
      </div>
    </div>
  </div>
</div>

<script>
const CLASSES = [
  { name:'Warrior', icon:'⚔️', hp:120, atk:25, def:15, mp:30, special:'Attack Boost', specialDesc:'10 MP · Permanently +5 ATK', cost:10 },
  { name:'Knight',  icon:'🛡️', hp:130, atk:20, def:20, mp:25, special:'Shield Wall',  specialDesc:'10 MP · Permanently +5 DEF', cost:10 },
  { name:'Sorcerer',icon:'🔮', hp:100, atk:22, def:15, mp:50, special:'Arcane Heal',  specialDesc:'10 MP · Restore 30–39 HP',  cost:10 }
];
const BOT_NAMES = ['BotWarrior','BotKnight','BotSorcerer'];

let selectedClass = 0, player = null, bot = null, active = false;

function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function make(name,cls){ const c=CLASSES[cls]; return {name,cls,icon:c.icon,hp:c.hp,maxHp:c.hp,atk:c.atk,def:c.def,mp:c.mp,maxMp:c.mp}; }
function dmg(src){ return src.atk + rnd(0,4); }
function hit(tgt,raw){ let d=raw-Math.floor(tgt.def/2); if(d<1)d=1; tgt.hp=Math.max(0,tgt.hp-d); return d; }

function selectClass(i){
  selectedClass = i;
  document.querySelectorAll('.class-card').forEach((el,j)=>el.classList.toggle('selected',j===i));
  updatePreview();
}

function updatePreview(){
  const c=CLASSES[selectedClass];
  document.getElementById('stat-preview').innerHTML =
    ['HP','ATK','DEF','MP'].map((k,i)=>`<div class="stat-pill">${k} <strong>${[c.hp,c.atk,c.def,c.mp][i]}</strong></div>`).join('');
}

function startGame(){
  const name = document.getElementById('char-name').value.trim()||'Hero';
  player = make(name, selectedClass);
  const bc = rnd(0,2);
  bot = make(BOT_NAMES[bc], bc);
  active = true;
  document.getElementById('battle-log').innerHTML='';
  setupBattle();
  show('screen-battle');
  log(`A challenger appears: ${bot.icon} ${bot.name}!`, 'system');
}

function setupBattle(){
  document.getElementById('p-name').textContent = player.icon+' '+player.name;
  document.getElementById('p-class').textContent = CLASSES[player.cls].name;
  document.getElementById('b-name').textContent = bot.icon+' '+bot.name;
  document.getElementById('b-class').textContent = CLASSES[bot.cls].name;
  const sc = CLASSES[player.cls];
  document.getElementById('special-title').textContent = '✦ '+sc.special;
  document.getElementById('special-desc').textContent = sc.specialDesc;
  bars();
}

function bars(){
  const pp=pct(player.hp,player.maxHp), bp=pct(bot.hp,bot.maxHp), mp=pct(player.mp,player.maxMp);
  document.getElementById('p-hp-bar').style.width=pp+'%';
  document.getElementById('b-hp-bar').style.width=bp+'%';
  document.getElementById('p-mp-bar').style.width=mp+'%';
  document.getElementById('p-hp-val').textContent=player.hp+'/'+player.maxHp;
  document.getElementById('b-hp-val').textContent=bot.hp+'/'+bot.maxHp;
  document.getElementById('p-mp-val').textContent=player.mp+'/'+player.maxMp;
  document.getElementById('btn-special').disabled = player.mp < 10;
}

function pct(v,m){ return Math.max(0,Math.round(v/m*100)); }

function special(char){
  const c=CLASSES[char.cls];
  if(char.mp < c.cost) return false;
  char.mp -= c.cost;
  if(char.cls===0){ char.atk+=5; return 'atk'; }
  if(char.cls===1){ char.def+=5; return 'def'; }
  const h=rnd(30,39); char.hp=Math.min(char.maxHp,char.hp+h); return h;
}

function doMove(type){
  if(!active) return;
  lock(true);
  if(type==='attack'){
    const raw=dmg(player), d=hit(bot,raw);
    log(`You strike for ${d} damage.`,'player');
  } else {
    const r=special(player);
    if(r===false){ log('Not enough mana!',''); lock(false); return; }
    if(r==='atk') log('Attack aura flares — +5 ATK!','player');
    else if(r==='def') log('Iron will fortified — +5 DEF!','player');
    else log(`Arcane light surges — healed ${r} HP.`,'heal');
  }
  bars();
  if(bot.hp<=0){ end(true); return; }
  setTimeout(()=>{
    const m=rnd(0,2);
    if(m<=1){
      const raw=dmg(bot), d=hit(player,raw);
      log(`${bot.name} strikes you for ${d} damage.`,'bot');
    } else {
      const r=special(bot);
      if(r===false) log(`${bot.name} tried a special but lacks mana.`,'bot');
      else if(r==='atk') log(`${bot.name} empowers its attack!`,'bot');
      else if(r==='def') log(`${bot.name} hardens its defenses!`,'bot');
      else log(`${bot.name} healed ${r} HP.`,'heal');
    }
    bars();
    if(player.hp<=0){ end(false); return; }
    lock(false);
  }, 700);
}

function lock(v){
  document.getElementById('btn-attack').disabled = v;
  document.getElementById('btn-special').disabled = v || player.mp < 10;
}

function log(msg, type=''){
  const box=document.getElementById('battle-log');
  const div=document.createElement('div');
  div.className='log-line '+(type||'');
  div.textContent=msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function end(won){
  active=false;
  setTimeout(()=>{
    document.getElementById('result-icon').textContent = won?'🏆':'💀';
    document.getElementById('result-title').textContent = won?'Victory':'Defeated';
    document.getElementById('result-title').className = 'result-heading '+(won?'win':'lose');
    document.getElementById('result-desc').textContent = won
      ? `You vanquished ${bot.name} with ${player.hp} HP remaining.`
      : `${bot.name} has bested you. Return stronger.`;
    show('screen-result');
  }, 400);
}

function showCreate(){ show('screen-create'); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

updatePreview();
</script>
</body>
</html>
